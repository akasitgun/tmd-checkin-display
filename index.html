<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>TMD Check-in – One-page Dashboard (Spotlight Auto-scroll)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --brand-blue:#0b59a1; --brand-green:#22c55e;
    --bg: var(--brand-blue); --ink:#ffffff; --sub:#d3e6ff;
    --card: rgba(255,255,255,.10); --stroke: rgba(255,255,255,.15);
  }
  *{ box-sizing:border-box } html,body{ height:100% }
  body{
    margin:0; color:var(--ink);
    font-family:"Segoe UI", system-ui, -apple-system, Arial, Helvetica, sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
    background:
      radial-gradient(1200px 700px at 12% 10%, rgba(255,255,255,.10), transparent 60%),
      radial-gradient(1200px 700px at 88% 90%, rgba(255,255,255,.06), transparent 60%),
      linear-gradient(180deg, #0a4e8d 0%, #0b59a1 50%, #083d6b 100%);
  }

  /* ===== Header ===== */
  .header{
    display:grid; align-items:center; gap:1rem;
    grid-template-columns: 1fr 1.2fr 1fr;
    padding: clamp(10px, 1.3vw, 18px) clamp(14px, 1.6vw, 22px);
    background: linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    border-bottom: 2px solid var(--stroke);
  }
  .brand{
    display:flex; align-items:center; gap:.6rem; font-weight:900; font-size: clamp(18px, 2.1vw, 24px)
  }
  /* โลโก้ (นิ่ง) */
  .brand .logo{
    height: clamp(38px, 5vw, 70px);  /* ปรับใหญ่ขึ้น */
    width: auto;
    object-fit: contain;
    display:inline-block;
    margin-right: .45rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.25));
  }
  .live{
    display:inline-flex; align-items:center; gap:.45rem; background:#ef4444; color:#fff; font-weight:900;
    font-size: clamp(10px, 1.2vw, 12px); padding:.35rem .6rem; border-radius:999px; letter-spacing:.6px;
    box-shadow: 0 0 0 2px rgba(255,255,255,.15) inset, 0 6px 18px rgba(239,68,68,.35);
    animation: blink 1s steps(2,end) infinite;
  }
  .dot{ width:.55rem; height:.55rem; background:#fff; border-radius:50% }
  @keyframes blink{ 50% { opacity:.45 } }

  /* KPI: 2 ช่อง แถวเดียว */
  .bigkpi{
    display:flex; align-items:center; justify-content:center;
    gap: clamp(.8rem, 1.4vw, 1.2rem); flex-wrap: nowrap;
  }
  .kpi-total, .kpi-dept{
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.20);
    padding: .7rem 1rem; border-radius: 12px;
    min-width: clamp(220px, 24vw, 360px);
    text-align:center; white-space: nowrap;
  }
  .kpi-total{
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.25);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 8px 30px rgba(0,0,0,.25);
  }
  .kpi-total .num{
    font-weight:900; line-height:1; letter-spacing:.5px; text-shadow:0 6px 0 rgba(0,0,0,.15);
    font-size: clamp(40px, 6.6vw, 92px);
  }
  .kpi-total .lbl, .kpi-dept .lbl{
    color:var(--sub); margin-top:.35rem; font-size: clamp(11px, 1.1vw, 13px);
  }
  .kpi-dept .num{ font-weight:900; line-height:1.05; letter-spacing:.3px; font-size: clamp(18px, 2.6vw, 28px); }

  .timebox{ text-align:right; line-height:1.25 }
  .now{ font-size: clamp(22px, 3.8vw, 44px); font-weight:900; letter-spacing:.5px; text-shadow: 0 4px 0 rgba(0,0,0,.15) }
  .date{ font-size: clamp(14px, 2.2vw, 20px); font-weight:700; color: var(--sub) }
  .upd{ font-size: clamp(11px, 1.4vw, 13px); color: var(--sub); margin-top:.2rem }

  /* ===== Body layout ===== */
  .wrap{ flex:1; padding: clamp(12px, 1.6vw, 18px) clamp(14px, 1.6vw, 22px); overflow:hidden; }
  .cols{
    height:100%; display:grid; gap: clamp(12px, 1.4vw, 18px);
    grid-template-columns: 1.15fr 1fr 1.15fr;
  }
  @media (max-width: 1440px){ .cols{ grid-template-columns: 1fr 1fr } }
  @media (max-width: 992px){  .cols{ grid-template-columns: 1fr } }

  .card{
    height:100%; background:var(--card); border:1px solid var(--stroke);
    border-radius:14px; padding: clamp(12px, 1.4vw, 18px); overflow:auto;
    backdrop-filter: blur(4px);
  }
  .card .h3{
    margin:0 0 .7rem 0; font-size: clamp(14px, 1.6vw, 16px); color:var(--sub); font-weight:800; letter-spacing:.2px
  }

  /* ===== Spotlight (Auto-scroll viewport) ===== */
  .spot-viewport{
    overflow:auto; scroll-behavior:smooth;
    height: min(380px, 42vh);               /* กำหนดให้เกิด overflow เพื่อเลื่อน */
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    padding: clamp(8px, 1vw, 12px);
    background:rgba(255,255,255,.05);
    mask-image: linear-gradient(to bottom, transparent 0, black 12px, black calc(100% - 12px), transparent 100%);
  }
  .spot-vert{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap: clamp(8px, 1vw, 10px); }
  .spot-row{
    display:grid; grid-template-columns:auto 1fr; grid-template-rows:auto auto; gap: 6px 10px;
    grid-template-areas: "rank name" "rank meta";
    padding: clamp(10px, 1.1vw, 14px);
    border:1px solid rgba(255,255,255,.16); border-radius:12px;
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
    box-shadow: 0 10px 30px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.22);
  }
  .rank-pill{
    grid-area:rank; align-self:center; min-width:46px; text-align:center;
    font-weight:900; font-size: clamp(12px, 1.4vw, 13px);
    padding:.4rem .6rem; border-radius:999px; letter-spacing:.4px; border:1px solid rgba(0,0,0,.12);
    background: linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,.35)); color:#071a0c;
    box-shadow: 0 6px 12px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.75);
  }
  .rank-1{ background: linear-gradient(180deg, #ffd64d, #ffb300); color:#3a2a00 }
  .rank-2{ background: linear-gradient(180deg, #e5e7eb, #cfd4dd); color:#273245 }
  .rank-3{ background: linear-gradient(180deg, #f1a97a, #e07b39); color:#3a1d00 }
  .rank-4{ background: linear-gradient(180deg, #7dd3fc, #38bdf8); color:#082f49 }
  .rank-5{ background: linear-gradient(180deg, #86efac, #22c55e); color:#052e16 }

  .s-name{
    grid-area:name; font-weight:900; font-size: clamp(18px, 2.4vw, 28px);
    letter-spacing:.3px; text-shadow:0 2px 0 rgba(0,0,0,.15);
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .s-meta{
    grid-area:meta; color:var(--sub); font-size: clamp(12px, 1.7vw, 14px);
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .meta-icon{ opacity:.9; margin-right:.35rem }

  .spot-confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2; }
  .spot-confetti i{ position:absolute; top:-10px; width:8px; height:14px; border-radius:2px; opacity:.9; animation: fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(120vh) rotate(360deg); opacity:.95 } }

  /* ===== Department Summary (auto scroll) ===== */
  .scroll-viewport{
    overflow:auto; scroll-behavior:smooth;
    border:1px solid rgba(255,255,255,.12); border-radius:10px; padding: clamp(6px, 1vw, 8px);
    background:rgba(255,255,255,.05);
    height: min(520px, 58vh); max-height: calc(100% - 12px);
    mask-image: linear-gradient(to bottom, transparent 0, black 12px, black calc(100% - 12px), transparent 100%);
  }
  .dept-item{ margin: clamp(6px, 1vw, 10px) 0 }
  .dept-row{ display:flex; align-items:center; justify-content:space-between; gap:10px }
  .dept-name{ font-weight:900; font-size: clamp(14px, 1.8vw, 16px); overflow:hidden; white-space:nowrap; text-overflow:ellipsis }
  .dept-count{ color:var(--sub); font-size: clamp(12px, 1.6vw, 13px); min-width:60px; text-align:right }
  .dept-count::after{ content:" คน"; }
  .bar{ position:relative; height:12px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:999px; overflow:hidden; margin-top:.35rem; }
  .bar > span{ position:absolute; inset:0 auto 0 0; width:0%; background:linear-gradient(90deg,var(--brand-green),#86efac); border-right:1px solid rgba(255,255,255,.4) }

  /* ===== Recent 50 (auto scroll) ===== */
  .recent-viewport{
    overflow:auto; scroll-behavior:smooth;
    border:1px solid rgba(255,255,255,.12); border-radius:10px; padding: clamp(6px, 1vw, 8px);
    background:rgba(255,255,255,.05);
    height: min(520px, 58vh); max-height: calc(100% - 12px);
    mask-image: linear-gradient(to bottom, transparent 0, black 12px, black calc(100% - 12px), transparent 100%);
  }
  .recent-list{ list-style:none; padding:0; margin:0; }
  .recent-list li{
    padding: clamp(8px, 1.2vw, 12px) clamp(6px, 1vw, 10px);
    border-bottom:1px solid rgba(255,255,255,.12);
    display:flex; flex-direction:column; gap:4px; animation: fade .25s ease-in-out;
  }
  .recent-list li:last-child{ border-bottom:0 }
  .r-name{ font-size: clamp(16px, 2.1vw, 20px); font-weight:900; overflow:hidden; white-space:nowrap; text-overflow:ellipsis }
  .r-meta{ font-size: clamp(12px, 1.7vw, 14px); color:var(--sub); overflow:hidden; white-space:nowrap; text-overflow:ellipsis }
  .scroll-controls{ display:flex; gap:.5rem; justify-content:flex-end; margin-top:.6rem }
  .btn{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; padding:.45rem .65rem; border-radius:8px; cursor:pointer; font-weight:800; font-size: clamp(11px, 1.5vw, 12px) }
  .btn:hover{ filter:brightness(1.1) }
  @keyframes fade{ from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }

  .footer{ padding: .6rem clamp(12px, 1.6vw, 22px) .8rem; font-size: clamp(11px, 1.5vw, 13px); color:var(--sub); text-align:center }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <img id="brand-logo" class="logo" alt="TMD logo" src="" />
      ✔ TMD 60th Anniversary • Check‑in Dashboard
      <span class="live"><span class="dot"></span>LIVE</span>
    </div>

    <!-- KPI: 2 ช่อง -->
    <div class="bigkpi">
      <div class="kpi-total">
        <div class="num" id="kpi-total">0</div>
        <div class="lbl">จำนวนผู้เช็คอินทั้งหมด</div>
      </div>
      <div class="kpi-dept">
        <div class="num" id="kpi-dept">0</div>
        <div class="lbl">จำนวนแผนก</div>
      </div>
    </div>

    <div class="timebox">
      <div class="now" id="now">--:--:--</div>
      <div class="date" id="date">----</div>
      <div class="upd" id="updated">ข้อมูลอัปเดต: -</div>
    </div>
  </div>

  <!-- Body -->
  <div class="wrap">
    <div class="cols">

      <!-- Spotlight Top-5 (Auto-scroll) -->
      <div class="card">
        <div class="h3">Spotlight – ผู้เช็คอินล่าสุด 5 ลำดับแรก</div>
        <div class="spot-viewport" id="spot-viewport">
          <ul id="spot-list" class="spot-vert"></ul>
        </div>
        <!-- confetti สำหรับ #1 -->
        <div id="spot-confetti" class="spot-confetti"></div>
      </div>

      <!-- Department Summary (auto scroll) -->
      <div class="card">
        <div class="h3">สรุปจำนวนตามแผนก</div>
        <div id="dept-viewport" class="scroll-viewport">
          <div id="dept-wrap"></div>
        </div>
      </div>

      <!-- Recent 50 (auto scroll) -->
      <div class="card">
        <div class="h3">เช็คอินล่าสุด 50 รายชื่อ</div>
        <div class="scroll-wrap">
          <div id="recent-viewport" class="recent-viewport">
            <ul id="recent-list" class="recent-list"></ul>
          </div>
          <div class="scroll-controls">
            <button id="btn-up" class="btn">▲ Up</button>
            <button id="btn-down" class="btn">▼ Down</button>
            <button id="btn-pause" class="btn">⏸ Pause</button>
            <button id="btn-resume" class="btn">▶ Resume</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="status" class="footer">Initializing…</div>

<script>
  /* ===== Settings ===== */
  const DATA_URL   = "https://raw.githubusercontent.com/akasitgun/tmd-checkin-display/main/data.json";
  const POLL_MS    = 1200;
  const TOP_DEPT   = 50;
  const RECENT_N   = 50;
  const SPOT_N     = 5;         // จำนวน Spotlight
  const ORDER_LABEL= 'ลำดับ';   // หรือ 'Registration No.'

  const RECENT_STEP = 1.2, RECENT_TICK = 16;  // recent list
  const DEPT_STEP   = 1.0, DEPT_TICK   = 16;  // department summary
  const SPOT_STEP   = 1.0, SPOT_TICK   = 20;  // spotlight auto-scroll

  /* ===== Logo URL (จริง) ===== */
  const LOGO_URL = 'https://raw.githubusercontent.com/akasitgun/tmd-checkin-display/main/MEIDEN.png';

  /* ===== State ===== */
  let lastKey   = "";
  let lastTotal = 0;
  let lastTop1Ts= "";
  let items     = [];

  const recentState = { dir:1, timer:null };
  const deptState   = { dir:1, timer:null };
  const spotState   = { dir:1, timer:null };

  /* ===== Helpers ===== */
  const $  = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);
  const fmt = ts => { try{ return new Date(ts).toLocaleString('th-TH',{ hour12:false }); }catch{return ts||"";} };
  const fmtDate = d => { try{ return new Date(d).toLocaleDateString('th-TH',{weekday:'long', year:'numeric', month:'long', day:'numeric'}); } catch{ return d || "" } };

  function normalize(d){
    if (!d) return { items:[], updated:"" };
    if (Array.isArray(d.items)) return { items:d.items.slice(), updated: d.updated || (d.items[0]?.timestamp || "") };
    if (typeof d === 'object')  return { items:[d], updated: d.timestamp || "" };
    try{ return normalize(JSON.parse(d)); }catch{ return { items:[], updated:"" }; }
  }
  function byNewest(a,b){ return new Date(b.timestamp||0) - new Date(a.timestamp||0); }
  function buildKey(list, updated){
    return (updated || (list[0]?.timestamp || "")) + "::" + list.slice(0,200).map(x=>`${x.name}|${x.order}|${x.department}|${x.timestamp}`).join("||");
  }
  function groupDept(list){
    const m = new Map(); list.forEach(x=>{ const d=(x.department||"Other").trim(); m.set(d,(m.get(d)||0)+1); });
    return [...m.entries()].sort((a,b)=>b[1]-a[1]);
  }

  /* ===== Header ===== */
  function tickClock(){
    const now = new Date();
    $("#now").textContent  = now.toLocaleTimeString('th-TH',{hour12:false});
    $("#date").textContent = fmtDate(now);
  }
  setInterval(tickClock, 500); tickClock();

  function animateTotal(from, to, ms=700){
    const el = $("#kpi-total"); const start = performance.now();
    function step(t){ const p=Math.min(1,(t-start)/ms); const val=Math.round(from + (to-from)*p); el.textContent = val.toLocaleString('th-TH'); if (p<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  }
  function safeTotal(data){
    const t = (typeof data?.total === 'number') ? data.total : items?.length;
    return (typeof t === 'number' && isFinite(t)) ? t : 0;
  }
  function msToSec(ms) { return Math.max(0, Math.round(ms/1000)); }

  function renderHeader(updated, data){
    const total = safeTotal(data);
    if (total !== lastTotal){ animateTotal(lastTotal, total); lastTotal = total; }
    else { $("#kpi-total").textContent = total.toLocaleString('th-TH'); }

    $("#kpi-dept").textContent  = groupDept(items).length;

    const latestTs = items[0]?.timestamp || "";
    const firstTs  = items[items.length - 1]?.timestamp || "";
    const now = Date.now();
    const latencySec = latestTs ? msToSec(now - new Date(latestTs).getTime()) : null;

    const updLine = [
      `ข้อมูลอัปเดต: ${updated ? fmt(updated) : (latestTs ? fmt(latestTs) : "-")}`,
      (firstTs && latestTs) ? `ช่วงเวลา: ${fmt(firstTs)} – ${fmt(latestTs)}` : null,
      (latencySec !== null) ? `ดีเลย์ ~${latencySec} วิ` : null
    ].filter(Boolean).join(" • ");
    $("#updated").textContent = updLine;
  }

  /* ===== Auto scroll (generic) ===== */
  function startAutoScroll(vp, state, step, tick){
    stopAutoScroll(state);
    state.timer = setInterval(()=>{
      if (!vp) return;
      if (vp.scrollHeight <= vp.clientHeight) return;
      vp.scrollTop += step * state.dir;
      const endBottom = (vp.scrollTop + vp.clientHeight >= vp.scrollHeight - 1);
      const endTop    = (vp.scrollTop <= 0);
      if (endBottom) state.dir = -1;
      if (endTop)    state.dir = 1;
    }, tick);
  }
  function stopAutoScroll(state){ if (state.timer){ clearInterval(state.timer); state.timer = null; } }

  /* ===== Spotlight (A2) – Auto-scroll ===== */
  function confettiInto(container, ms=1500, N=60){
    container.innerHTML = "";
    for(let i=0;i<N;i++){
      const el = document.createElement("i");
      const h  = Math.floor(Math.random()*360);
      el.style.left = Math.random()*100 + "%";
      el.style.background = `hsl(${h} 90% 60%)`;
      el.style.animationDuration = (1.6 + Math.random()*0.9) + "s";
      el.style.transform = `translateX(${(Math.random()*40-20)}px)`;
      container.appendChild(el);
    }
    setTimeout(()=>{ container.innerHTML=""; }, ms+300);
  }

  function renderSpotlightVertical(n=SPOT_N){
    const ul = $("#spot-list");
    const vp = $("#spot-viewport");
    ul.innerHTML = "";

    const top = items.slice(0, n);
    top.forEach((x, idx)=>{
      const li   = document.createElement("li");
      li.className = "spot-row";
      const order = (x.order ?? (idx+1));
      li.innerHTML = `
        <div class="rank-pill rank-${idx+1}">#${order}</div>
        <div class="s-name">${x.name || "ผู้เข้าร่วม"}</div>
        <div class="s-meta">
          ${ (x.department||"").toString().trim() ? `<span class="meta-icon">🏢</span>แผนก ${(x.department||"").toString().trim()} • ` : "" }
          <span class="meta-icon">⏰</span>เวลา ${fmt(x.timestamp)}
        </div>
      `;
      ul.appendChild(li);
    });

    // Confetti เมื่ออันดับ 1 เปลี่ยน
    const ts1 = top[0]?.timestamp || "";
    if (ts1 && ts1 !== lastTop1Ts){ lastTop1Ts = ts1; confettiInto($("#spot-confetti")); }

    // เริ่มเลื่อนอัตโนมัติ (Spotlight)
    requestAnimationFrame(()=> startAutoScroll(vp, spotState, SPOT_STEP, SPOT_TICK));
  }

  /* ===== Department Summary ===== */
  function renderDept(){
    const wrap = $("#dept-wrap"); wrap.innerHTML="";
    const pairs = groupDept(items).slice(0, TOP_DEPT);
    const max = Math.max(1, ...pairs.map(p=>p[1]));
    pairs.forEach(([name,count])=>{
      const row = document.createElement("div");
      row.className = "dept-item";
      row.innerHTML = `
        <div class="dept-row">
          <div class="dept-name">${name||"Other"}</div>
          <div class="dept-count">${count}</div>
        </div>
        <div class="bar"><span style="width:${Math.round(count/max*100)}%"></span></div>
      `;
      wrap.appendChild(row);
    });
    requestAnimationFrame(()=> startAutoScroll($("#dept-viewport"), deptState, DEPT_STEP, DEPT_TICK));
  }

  /* ===== Recent 50 ===== */
  function renderRecent(){
    const ul = $("#recent-list"); ul.innerHTML="";
    items.slice(0, RECENT_N).forEach((x, i)=>{
      const order = (x.order ?? (i+1));
      const name  = (x.name || "ผู้เข้าร่วม");
      const dept  = (x.department || "").toString().trim();
      const line1 = `<div class="r-name">#${order}  ${name}</div>`;
      const line2 = `<div class="r-meta">${dept ? `<span class="meta-icon">🏢</span>แผนก ${dept} • ` : ""}<span class="meta-icon">⏰</span>เวลา ${fmt(x.timestamp)}</div>`;
      const li = document.createElement("li");
      li.innerHTML = line1 + line2;
      ul.appendChild(li);
    });
    requestAnimationFrame(()=> startAutoScroll($("#recent-viewport"), recentState, RECENT_STEP, RECENT_TICK));
  }

  // Controls for Recent scroll
  $("#btn-up").addEventListener("click", ()=>{ recentState.dir = -1; startAutoScroll($("#recent-viewport"), recentState, RECENT_STEP, RECENT_TICK); });
  $("#btn-down").addEventListener("click", ()=>{ recentState.dir =  1; startAutoScroll($("#recent-viewport"), recentState, RECENT_STEP, RECENT_TICK); });
  $("#btn-pause").addEventListener("click", ()=> stopAutoScroll(recentState));
  $("#btn-resume").addEventListener("click", ()=> startAutoScroll($("#recent-viewport"), recentState, RECENT_STEP, RECENT_TICK));

  // Hover pause (Recent / Dept / Spotlight)
  $("#recent-viewport").addEventListener("mouseenter", ()=> stopAutoScroll(recentState));
  $("#recent-viewport").addEventListener("mouseleave", ()=> startAutoScroll($("#recent-viewport"), recentState, RECENT_STEP, RECENT_TICK));
  $("#dept-viewport").addEventListener("mouseenter", ()=> stopAutoScroll(deptState));
  $("#dept-viewport").addEventListener("mouseleave", ()=> startAutoScroll($("#dept-viewport"), deptState, DEPT_STEP, DEPT_TICK));
  $("#spot-viewport").addEventListener("mouseenter", ()=> stopAutoScroll(spotState));
  $("#spot-viewport").addEventListener("mouseleave", ()=> startAutoScroll($("#spot-viewport"), spotState, SPOT_STEP, SPOT_TICK));

  /* ===== Data loop ===== */
  async function load(){
    try{
      const r = await fetch(DATA_URL + "?t=" + Date.now(), { cache:"no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      let raw = await r.json(); if (typeof raw === "string"){ try{ raw = JSON.parse(raw); }catch{} }

      const data = normalize(raw);
      const list = (data.items||[]).slice().sort(byNewest);
      const key  = buildKey(list, data.updated);

      if (key !== lastKey){
        lastKey = key; items = list;

        renderHeader(data.updated, data);
        renderSpotlightVertical(SPOT_N);   // <<< Spotlight Auto-scroll
        renderDept();
        renderRecent();

        $("#status").textContent = `Showing ${items.length} items • Poll ${POLL_MS}ms • Source: RAW • Spotlight auto-scroll`;
      }
    }catch(e){
      $("#status").textContent = "Fetch error: " + (e.message || e);
    }
  }

  // ตั้งค่าโลโก้จริง
  (function initLogo(){
    const img = document.getElementById('brand-logo');
    if (img){
      img.src = LOGO_URL;
      img.addEventListener('error', ()=>{ img.style.display='none'; });
    }
  })();

  // กันหน้าว่าง
  document.getElementById('kpi-total').textContent = '0';

  load();
  setInterval(load, POLL_MS);
</script>
</body>
</html>
