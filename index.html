<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>TMD Check-in Live Ticker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    background: #0b59a1;
    font-family: "Segoe UI", sans-serif;
    overflow: hidden;
  }

  /* Header ต้อนรับ */
  .header {
    text-align: center;
    padding: 24px;
    color: #ffffff;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  /* บริเวณ ticker */
  .ticker-container {
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    box-sizing: border-box;
    padding: 20px 0;
    background: rgba(255,255,255,0.10);
    border-top: 3px solid rgba(255,255,255,0.2);
    border-bottom: 3px solid rgba(255,255,255,0.2);
  }

  .ticker-text {
    display: inline-block;
    padding-left: 100%;
    font-size: 80px;
    font-weight: 900;
    color: #ffffff;
    animation: ticker 12s linear infinite;
  }

  @keyframes ticker {
    0%   { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
  }

  /* เมื่อโหลดชื่อใหม่ให้มี effect */
  .flash {
    animation: flashAnim 0.4s ease-in-out;
  }
  @keyframes flashAnim {
    0% { color: #22c55e; }
    100% { color: #ffffff; }
  }

  /* เวลา update ล่าสุด */
  .timestamp {
    color: #d3e6ff;
    text-align: center;
    margin-top: 16px;
    font-size: 20px;
  }
</style>
</head>

<body>

  <div class="header">
    ✔ TMD 60th Anniversary • Live Check-in
  </div>

  <div class="ticker-container">
    <div id="ticker" class="ticker-text">
      Waiting for check-ins...
    </div>
  </div>

  <div id="ts" class="timestamp"></div>

<script>
  const DATA_URL = "data.json";
  const POLL_MS = 1500;

  let lastStamp = null;
  const ticker = document.getElementById("ticker");
  const tsBox = document.getElementById("ts");

  async function load() {
    try {
      const r = await fetch(DATA_URL + "?t=" + Date.now());
      const d = await r.json();

      const name = d.name || "Guest";
      const order = d.order || "";
      const timestamp = d.timestamp || "";

      if (timestamp !== lastStamp && timestamp !== "") {
        lastStamp = timestamp;

        // ข้อความที่วิ่งใน ticker
        ticker.textContent = `🎉 ยินดีต้อนรับคุณ ${name}  (Order: ${order}) 🎉`;

        // Flash effect เมื่อมีข้อมูลใหม่
        ticker.classList.remove("flash");
        void ticker.offsetWidth; /* trigger reflow */
        ticker.classList.add("flash");

        // Reset animation เพื่อเริ่มวิ่งใหม่
        ticker.style.animation = "none";
        setTimeout(() => {
          ticker.style.animation = "";
        }, 50);

        // แสดงเวลาล่าสุด
        tsBox.textContent = "Updated: " + new Date(timestamp).toLocaleString();
      }
    } catch (e) {
      console.error("Error fetching data", e);
    }
  }

  load();
  setInterval(load, POLL_MS);
</script>

</body>
</html>
