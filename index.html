<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>TMD Check-in – Wow Display + Spotlight(5)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --bg:#0b59a1; --ink:#fff; --sub:#d3e6ff; --accent:#22c55e; --card: rgba(255,255,255,.10);
    --muted: rgba(255,255,255,.75);
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background: var(--bg); color: var(--ink);
    font-family:"Segoe UI", system-ui, -apple-system, Arial, Helvetica, sans-serif;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; background:linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,0));
    border-bottom: 2px solid rgba(255,255,255,.15);
  }
  .brand{ font-size:28px; font-weight:900; letter-spacing:.3px; }
  .meta{ font-size:14px; color:var(--sub); }
  .wrap{ flex:1; width:100%; max-width:1920px; margin:0 auto; padding:16px 24px; }

  .mode{ display:none; }
  .mode.active{ display:block; }

  /* ---------- SPOTLIGHT ---------- */
  .spot-wrap{
    position:relative; height: calc(100vh - 116px);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; border-radius:16px; border:1px solid rgba(255,255,255,.15);
    background:
      radial-gradient(1200px 600px at 10% 10%, rgba(255,255,255,.12), transparent 60%),
      radial-gradient(1200px 600px at 90% 90%, rgba(255,255,255,.08), transparent 60%),
      var(--card);
  }
  .spot-glow{
    position:absolute; inset:-10%;
    filter: blur(60px); opacity:.35; pointer-events:none;
    background:
      radial-gradient(50% 40% at 20% 30%, #22c55e55, transparent 60%),
      radial-gradient(40% 35% at 80% 60%, #60a5fa55, transparent 60%);
    animation: glowMove 8s ease-in-out infinite alternate;
  }
  @keyframes glowMove{
    from{ transform: translateY(-2%) scale(1.02); }
    to  { transform: translateY(2%)  scale(1.05); }
  }
  .spot-card{
    position:relative; z-index:2; text-align:center;
    padding: 36px 48px; border-radius:20px;
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    border: 1px solid rgba(255,255,255,.18);
    box-shadow: 0 30px 120px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.25);
    animation: popIn .55s ease-out;
    max-width: 1200px;
  }
  @keyframes popIn{
    from{ opacity:0; transform: scale(.94); }
    to  { opacity:1; transform: scale(1); }
  }
  .spot-accent{
    height:8px; border-radius:999px;
    background: linear-gradient(90deg, #22c55e, #60a5fa, #22c55e);
    background-size: 200% 100%;
    animation: accentFlow 5s linear infinite;
    margin-bottom:22px;
  }
  @keyframes accentFlow{
    from{ background-position: 0% 0;}
    to  { background-position: 200% 0;}
  }
  .spot-title{
    font-size:64px; font-weight:900; letter-spacing:.5px; margin: 6px 0 10px 0;
    text-shadow: 0 4px 0 rgba(0,0,0,.15);
  }
  .spot-meta{
    font-size:22px; color:var(--sub);
  }
  /* confetti */
  .confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:3; }
  .confetti i{
    position:absolute; top:-10px; width:8px; height:14px; border-radius:2px; opacity:.9;
    animation: fall linear forwards; transform: translateX(0);
  }
  @keyframes fall{
    to{ transform: translateY(120vh) rotate(360deg); opacity: .95; }
  }

  /* ---------- HERO (KPI + Recent) ---------- */
  .hero{ display:grid; grid-template-columns: 1.2fr .8fr; gap:18px; }
  .card{ background:var(--card); border-radius:12px; padding:18px; border:1px solid rgba(255,255,255,.15);}
  .kpi{ display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
  .kpi .tile{ background: rgba(255,255,255,.08); padding:14px; border-radius:10px; text-align:center; border:1px solid rgba(255,255,255,.12);}
  .kpi .num{ font-size:44px; font-weight:900; line-height:1; }
  .kpi .lbl{ font-size:14px; color:var(--sub); margin-top:6px; }
  .dept-list{ margin-top:14px; display:flex; flex-wrap:wrap; gap:10px; }
  .badge{ background: rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); padding:8px 12px; border-radius:999px; font-size:14px; }
  .recent .title{ font-weight:800; margin-bottom:8px; color:var(--sub); }
  .recent ul{ list-style:none; padding:0; margin:0; }
  .recent li{ display:flex; justify-content:space-between; padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.12); }
  .recent li:last-child{ border-bottom:0; }
  .r-name{ font-size:22px; font-weight:800; }
  .r-meta{ font-size:14px; color:var(--sub); }

  /* ---------- GRID ---------- */
  .grid{ display:grid; grid-template-columns: repeat(10, 1fr); grid-auto-rows: 1fr; gap:10px; height: calc(100vh - 140px); }
  .cell{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); border-radius:8px; padding:8px; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
  .cell .nm{ font-size:18px; font-weight:800; }
  .cell .mt{ font-size:12px; color:var(--sub); margin-top:4px; }

  /* ---------- DEPT TICKER ---------- */
  .ticker{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); border-radius:10px; padding:12px 16px; white-space:nowrap; overflow:hidden; position:relative; }
  .ticker .lane{ display:inline-block; padding-left:100%; animation: slide 28s linear infinite; font-size:28px; font-weight:800; }
  @keyframes slide{ 0%{ transform:translateX(0);} 100%{ transform:translateX(-100%);} }

  /* footer status */
  .footer{ padding:10px 24px; text-align:center; color:var(--sub); font-size:14px; }

  @media (max-width:1280px){ .grid{ grid-template-columns: repeat(6,1fr);} .spot-title{ font-size:48px; } }
</style>
</head>
<body>
  <div class="header">
    <div class="brand">✔ TMD 60th Anniversary • Check‑in Display</div>
    <div class="meta" id="meta">Loading…</div>
  </div>

  <div class="wrap">
    <!-- MODE: SPOTLIGHT (latest N persons) -->
    <div id="mode-spotlight" class="mode active">
      <div class="spot-wrap">
        <div class="spot-glow"></div>
        <div class="confetti" id="confetti"></div>
        <div class="spot-card">
          <div class="spot-accent"></div>
          <div class="spot-title" id="spot-name">Waiting…</div>
          <div class="spot-meta" id="spot-meta"></div>
        </div>
      </div>
    </div>

    <!-- MODE: HERO -->
    <div id="mode-hero" class="mode">
      <div class="hero">
        <div class="card">
          <div class="kpi">
            <div class="tile"><div class="num" id="kpi-total">0</div><div class="lbl">จำนวนผู้เช็คอิน</div></div>
            <div class="tile"><div class="num" id="kpi-dept">0</div><div class="lbl">จำนวนแผนก</div></div>
            <div class="tile"><div class="num" id="kpi-latest">–</div><div class="lbl">อัปเดตล่าสุด</div></div>
          </div>
          <div class="dept-list" id="dept-list"></div>
        </div>
        <div class="card recent">
          <div class="title">ผู้เช็คอินล่าสุด</div>
          <ul id="recent-list"><li><span class="r-name">Waiting…</span><span class="r-meta"></span></li></ul>
        </div>
      </div>
    </div>

    <!-- MODE: GRID -->
    <div id="mode-grid" class="mode">
      <div class="grid" id="grid"></div>
    </div>

    <!-- MODE: TICKER -->
    <div id="mode-ticker" class="mode">
      <div class="ticker"><div class="lane" id="dept-ticker">Loading…</div></div>
    </div>
  </div>

  <div class="footer" id="status">Initializing…</div>

<script>
  /* ===== Settings ===== */
  const DATA_URL   = "https://raw.githubusercontent.com/akasitgun/tmd-checkin-display/main/data.json";
  const POLL_MS    = 1200;          // รอบดึงข้อมูล
  const PAGE_SIZE  = 60;            // GRID: ต่อหน้า
  const ROTATE_MS  = 8000;          // เวลาเปลี่ยนโหมดทั่วไป (Hero/Grid/Ticker)

  // Spotlight: โชว์ N คนล่าสุด ไล่ทีละคน
  const SPOT_COUNT   = 5;           // <<< จำนวนคนที่จะโชว์
  const SPOT_ITEM_MS = 2000;        // <<< เวลา/คน (ms)

  // ลำดับโหมด
  const MODES      = ["spotlight","hero","grid","ticker"];

  const LABEL_MODE = 'th';
  const ORDER_LABEL= LABEL_MODE==='th' ? 'ลำดับ' : 'Registration No.';

  /* ===== State ===== */
  let lastKey = "";     // ใช้ตรวจว่าข้อมูลเปลี่ยนไหม
  let items   = [];     // ข้อมูลทั้งหมดหลัง normalize/sort
  let cursor  = 0;      // GRID page cursor
  let modeIdx = 0;      // mode cursor

  // timers
  let pollTimer   = null;
  let modeTimer   = null;
  let spotTimer   = null;

  const $ = s => document.querySelector(s);
  const $$= s => document.querySelectorAll(s);
  const fmt = ts => { try{ return new Date(ts).toLocaleString('th-TH',{hour12:false}); }catch{return ts||"";} };

  function normalize(d){
    if (!d) return { items:[], updated:"" };
    if (Array.isArray(d.items)) return { items:d.items.slice(), updated: d.updated || (d.items[0]?.timestamp || "") };
    if (typeof d === 'object')  return { items:[d], updated: d.timestamp || "" };
    try{ return normalize(JSON.parse(d)); }catch{ return { items:[], updated:"" }; }
  }
  function byNewest(a,b){ return new Date(b.timestamp||0) - new Date(a.timestamp||0); }
  function aggregateDepartment(list){
    const map = new Map();
    list.forEach(x=>{
      const d = (x.department||"Other").trim();
      map.set(d, (map.get(d)||0)+1);
    });
    return [...map.entries()].sort((a,b)=>b[1]-a[1]);
  }
  function buildKey(list, updated){
    const sig = list.slice(0, 400).map(x=>`${x.name}|${x.order}|${x.department}|${x.timestamp}`).join("||");
    return updated + "::" + sig;
  }

  /* ---------- Spotlight (sequence N persons) ---------- */
  function renderSpotItem(x){
    $("#spot-name").textContent = x?.name || "ผู้เข้าร่วม";
    $("#spot-meta").textContent = `${ORDER_LABEL}: ${x?.order||"-"} • ${(x?.department||"")} • ${fmt(x?.timestamp)}`;

    // confetti
    const cont = $("#confetti");
    cont.innerHTML = "";
    const N = 50;
    for(let i=0;i<N;i++){
      const el = document.createElement("i");
      const h  = Math.floor(Math.random()*360);
      el.style.left = Math.random()*100 + "%";
      el.style.background = `hsl(${h} 90% 60%)`;
      el.style.animationDuration = (2.0 + Math.random()*1.5) + "s";
      el.style.transform = `translateX(${(Math.random()*40-20)}px)`;
      cont.appendChild(el);
    }
    setTimeout(()=>{ cont.innerHTML=""; }, SPOT_ITEM_MS);
  }

  function runSpotlightSequence(onDone){
    clearTimeout(spotTimer);
    const list = items.slice(0, SPOT_COUNT);   // ล่าสุด N คน
    if (list.length === 0){ onDone && onDone(); return; }

    let i = 0;
    const showNext = () => {
      renderSpotItem(list[i]);
      i++;
      if (i < list.length) {
        spotTimer = setTimeout(showNext, SPOT_ITEM_MS);
      } else {
        spotTimer = setTimeout(()=> onDone && onDone(), SPOT_ITEM_MS);
      }
    };
    showNext();
  }

  /* ---------- HERO ---------- */
  function renderHero(){
    const total = items.length;
    const depts = aggregateDepartment(items);
    const latest= items[0]?.timestamp || "";
    $("#kpi-total").textContent  = total;
    $("#kpi-dept").textContent   = depts.length;
    $("#kpi-latest").textContent = latest ? fmt(latest) : "–";

    const dl = $("#dept-list"); dl.innerHTML="";
    depts.slice(0,12).forEach(([name,count])=>{
      const b = document.createElement("div");
      b.className = "badge";
      b.textContent = `${name}: ${count}`;
      dl.appendChild(b);
    });

    const recent = items.slice(0,5);
    const ul = $("#recent-list"); ul.innerHTML="";
    recent.forEach(x=>{
      const li = document.createElement("li");
      li.innerHTML = `<span class="r-name">${x.name||"ผู้เข้าร่วม"}</span>
                      <span class="r-meta">${ORDER_LABEL}: ${x.order||"-"} • ${(x.department||"")} • ${fmt(x.timestamp)}</span>`;
      ul.appendChild(li);
    });
  }

  /* ---------- GRID (Paginated) ---------- */
  function renderGrid(){
    const grid = $("#grid"); grid.innerHTML="";
    const page = items.slice(cursor, cursor + PAGE_SIZE);
    page.forEach(x=>{
      const d = document.createElement("div"); d.className="cell";
      d.innerHTML = `<div class="nm">${x.name||"ผู้เข้าร่วม"}</div>
                     <div class="mt">${ORDER_LABEL}: ${x.order||"-"} • ${(x.department||"")} • ${fmt(x.timestamp)}</div>`;
      grid.appendChild(d);
    });
    cursor += PAGE_SIZE;
    if (cursor >= items.length) cursor = 0;
  }

  /* ---------- DEPT ticker ---------- */
  function renderTicker(){
    const a = aggregateDepartment(items);
    const text = a.map(([n,c])=> `${n}: ${c}`).join("  •  ");
    $("#dept-ticker").textContent = text || "Waiting…";
  }

  function activateMode(name){
    $$(".mode").forEach(m=>m.classList.remove("active"));
    $(`#mode-${name}`).classList.add("active");
  }

  /* ---------- Mode scheduler ---------- */
  function showMode(name){
    clearTimeout(modeTimer);
    clearTimeout(spotTimer);

    activateMode(name);

    if (name === "spotlight"){
      runSpotlightSequence(()=> {
        // ต่อไป Hero หลังโชว์ครบ N คน
        modeIdx = (MODES.indexOf("hero"));
        showMode(MODES[modeIdx]);
        // หลังเข้า Hero ตั้งรอบหมุนต่อไปตาม ROTATE_MS
        modeTimer = setTimeout(nextMode, ROTATE_MS);
      });
    } else if (name === "hero"){
      renderHero();
      modeTimer = setTimeout(nextMode, ROTATE_MS);
    } else if (name === "grid"){
      renderGrid();
      modeTimer = setTimeout(nextMode, ROTATE_MS);
    } else if (name === "ticker"){
      renderTicker();
      modeTimer = setTimeout(nextMode, ROTATE_MS);
    }
  }

  function nextMode(){
    // หมุน: spotlight → hero → grid → ticker → spotlight …
    const i = MODES.indexOf(document.querySelector(".mode.active").id.replace("mode-",""));
    modeIdx = (i + 1) % MODES.length;
    showMode(MODES[modeIdx]);
  }

  /* ---------- Data loop ---------- */
  async function load(){
    try{
      const r = await fetch(DATA_URL + "?t=" + Date.now(), { cache:"no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      let raw = await r.json(); if (typeof raw==="string"){ try{ raw=JSON.parse(raw);}catch{} }

      const data  = normalize(raw);
      const list  = (data.items||[]).slice().sort(byNewest);
      const key   = buildKey(list, data.updated || (list[0]?.timestamp || ""));

      items = list;
      $("#meta").textContent = `Updated: ${fmt(data.updated || list[0]?.timestamp || "")} • Total ${items.length}`;

      // ถ้าข้อมูลเปลี่ยน ให้รีเซ็ต page และ re-render พร้อมรีสตาร์ท spotlight หากอยู่ในโหมดนั้น
      if (key !== lastKey){
        lastKey = key;
        cursor  = 0;
        const current = document.querySelector(".mode.active")?.id?.replace("mode-","");
        if (current === "spotlight"){
          // รีสตาร์ทลำดับ 5 คนล่าสุดทันที
          runSpotlightSequence(()=> {
            // ไม่เปลี่ยนโหมดที่นี่ ปล่อยให้ scheduler จัดการต่อ
          });
        } else {
          // อัปเดตเนื้อหาของโหมดปัจจุบัน
          if (current === "hero")   renderHero();
          if (current === "grid")   renderGrid();
          if (current === "ticker") renderTicker();
        }
        $("#status").textContent = `Showing ${items.length} items • rotate ${ROTATE_MS/1000}s • spotlight ${(SPOT_ITEM_MS*SPOT_COUNT/1000).toFixed(1)}s • poll ${POLL_MS}ms`;
      }
    }catch(e){
      $("#status").textContent = "Fetch error: " + (e.message||e);
    }
  }

  // init
  showMode("spotlight");                 // เริ่มที่ Spotlight
  load();
  pollTimer = setInterval(load, POLL_MS);
</script>
</body>
</html>
