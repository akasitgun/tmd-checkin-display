<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>TMD Check-in – One-page Dashboard (Responsive + LIVE)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    /* === Theme (ปรับได้) === */
    --brand-blue:#0b59a1;
    --brand-green:#22c55e;
    --bg: var(--brand-blue);
    --ink:#ffffff;
    --sub:#d3e6ff;
    --card: rgba(255,255,255,.10);
    --stroke: rgba(255,255,255,.15);
    --muted: rgba(255,255,255,.75);
  }

  /* รีเซ็ตพื้นฐาน */
  *{ box-sizing:border-box }
  html,body{ height:100% }
  body{
    margin:0; color:var(--ink);
    font-family:"Segoe UI", system-ui, -apple-system, Arial, Helvetica, sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
    /* พื้นหลัง gradient + glow ให้ดูว้าวขึ้น */
    background:
      radial-gradient(1200px 700px at 12% 10%, rgba(255,255,255,.10), transparent 60%),
      radial-gradient(1200px 700px at 88% 90%, rgba(255,255,255,.06), transparent 60%),
      linear-gradient(180deg, #0a4e8d 0%, #0b59a1 50%, #083d6b 100%);
  }

  /* ========== HEADER ========== */
  .header{
    display:grid; align-items:center; gap:1rem;
    /* 3 คอลัมน์: Brand + KPI + Time */
    grid-template-columns: 1fr 1.2fr 1fr;
    padding: clamp(10px, 1.3vw, 18px) clamp(14px, 1.6vw, 22px);
    background: linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    border-bottom: 2px solid var(--stroke);
  }
  /* Brand + LIVE */
  .brand{
    display:flex; align-items:center; gap:.6rem;
    font-weight:900;
    font-size: clamp(18px, 2.1vw, 24px);
    letter-spacing:.3px;
  }
  .live{
    display:inline-flex; align-items:center; gap:.45rem;
    background:#ef4444; color:#fff; font-weight:900;
    font-size: clamp(10px, 1.2vw, 12px);
    padding:.35rem .6rem; border-radius:999px; letter-spacing:.6px;
    box-shadow: 0 0 0 2px rgba(255,255,255,.15) inset, 0 6px 18px rgba(239,68,68,.35);
    animation: blink 1s steps(2,end) infinite;
  }
  .dot{ width:.55rem; height:.55rem; background:#fff; border-radius:50% }
  @keyframes blink{ 50% { opacity:.45 } }

  /* KPI – Total emphasized + Dept count */
  .bigkpi{
    display:flex; align-items:center; justify-content:center; gap: clamp(.6rem, 1.5vw, 1rem);
  }
  .kpi-total{
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.25);
    padding: clamp(.6rem, 1.4vw, .9rem) clamp(.9rem, 1.8vw, 1.2rem);
    border-radius: 14px; text-align:center; min-width: clamp(220px, 26vw, 360px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 8px 30px rgba(0,0,0,.25);
  }
  .kpi-total .num{
    font-weight:900;
    /* ใหญ่ขึ้นมาก และ responsive */
    font-size: clamp(40px, 7vw, 92px);
    line-height:1; letter-spacing: .5px;
    text-shadow: 0 6px 0 rgba(0,0,0,.15);
  }
  .kpi-total .lbl{
    font-size: clamp(11px, 1.2vw, 13px); color:var(--sub); margin-top:.4rem
  }
  .kpi-dept{
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.20);
    padding: .6rem .9rem; border-radius: 12px; min-width: clamp(120px, 16vw, 180px);
    text-align:center;
  }
  .kpi-dept .num{ font-size: clamp(18px, 2.6vw, 28px); font-weight:900 }
  .kpi-dept .lbl{ font-size: clamp(10px, 1.1vw, 12px); color:var(--sub) }

  /* Current DateTime – ใหญ่ขึ้นมาก */
  .timebox{ text-align:right; line-height:1.25 }
  .now{
    font-size: clamp(22px, 3.8vw, 44px);
    font-weight:900; letter-spacing:.5px;
    text-shadow: 0 4px 0 rgba(0,0,0,.15);
  }
  .date{
    font-size: clamp(14px, 2.2vw, 20px);
    font-weight:700; color: var(--sub);
  }
  .upd{
    font-size: clamp(11px, 1.4vw, 13px);
    color: var(--sub); margin-top:.2rem
  }

  /* ========== BODY LAYOUT ========== */
  .wrap{ flex:1; padding: clamp(12px, 1.6vw, 18px) clamp(14px, 1.6vw, 22px); overflow:hidden; }
  .cols{
    height:100%;
    display:grid; gap: clamp(12px, 1.4vw, 18px);
    /* 3 คอลัมน์ > 1440px, 2 คอลัมน์ > 992px, 1 คอลัมน์ บนมือถือ */
    grid-template-columns: 1.15fr 1fr 1.15fr;
  }
  @media (max-width: 1440px){
    .cols{ grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 992px){
    .cols{ grid-template-columns: 1fr; }
  }

  .card{
    height:100%; background:var(--card); border:1px solid var(--stroke);
    border-radius:14px; padding: clamp(12px, 1.4vw, 18px); overflow:auto;
    backdrop-filter: blur(4px);
  }
  .card h3{
    margin:0 0 .7rem 0; font-size: clamp(14px, 1.6vw, 16px); color:var(--sub);
    font-weight:800; letter-spacing:.2px
  }

  /* === Spotlight === */
  .spot{
    position:relative; height:100%;
    display:flex; align-items:center; justify-content:center;
    border-radius:12px; padding: clamp(8px, 1vw, 10px); overflow:hidden;
    background:
      radial-gradient(1200px 600px at 10% 10%, rgba(255,255,255,.10), transparent 60%),
      radial-gradient(1200px 600px at 90% 90%, rgba(255,255,255,.07), transparent 60%),
      transparent;
  }
  .spot-card{
    width:100%; max-width:min(1100px, 92%); text-align:center;
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    border:1px solid rgba(255,255,255,.18); border-radius:18px; padding: clamp(16px, 2vw, 28px);
    box-shadow:0 30px 100px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.24);
    animation: popIn .45s ease-out;
  }
  .spot-accent{
    height:8px; border-radius:999px;
    background: linear-gradient(90deg,var(--brand-green),#60a5fa,var(--brand-green));
    background-size:200% 100%; animation: flow 6s linear infinite; margin-bottom: clamp(10px, 1.2vw, 16px);
  }
  .spot-name{
    font-size: clamp(32px, 5vw, 56px);
    font-weight:900; letter-spacing:.5px; margin:.3rem 0 .4rem;
    text-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .spot-meta{ font-size: clamp(14px, 2vw, 20px); color:var(--sub) }

  @keyframes popIn{ from{opacity:0; transform:scale(.96)} to{opacity:1; transform:scale(1)} }
  @keyframes flow{ from{background-position:0 0} to{background-position:200% 0} }

  .confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2 }
  .confetti i{
    position:absolute; top:-10px; width:8px; height:14px; border-radius:2px; opacity:.9;
    animation: fall linear forwards;
  }
  @keyframes fall{ to{ transform:translateY(120vh) rotate(360deg); opacity:.95 } }

  /* === Department Summary === */
  .dept-item{ margin: clamp(6px, 1vw, 10px) 0 }
  .dept-row{ display:flex; align-items:center; justify-content:space-between; gap:10px }
  .dept-name{ font-weight:800; font-size: clamp(14px, 1.8vw, 16px); }
  .dept-count{ color:var(--sub); font-size: clamp(11px, 1.6vw, 12px); min-width:48px; text-align:right }
  .bar{ position:relative; height:12px; background:rgba(255,255,255,.12);
        border:1px solid rgba(255,255,255,.2); border-radius:999px; overflow:hidden; margin-top:.35rem; }
  .bar > span{
    position:absolute; inset:0 auto 0 0; width:0%;
    background:linear-gradient(90deg,var(--brand-green),#86efac);
    border-right:1px solid rgba(255,255,255,.4);
  }

  /* === Recent 50 + Auto scroll === */
  .scroll-wrap{ position:relative; height:100%; display:flex; flex-direction:column; }
  .scroll-viewport{
    flex:1; overflow:auto; scroll-behavior:smooth;
    border:1px solid rgba(255,255,255,.12); border-radius:10px; padding: clamp(6px, 1vw, 8px);
    background:rgba(255,255,255,.05);
  }
  .recent-list{ list-style:none; padding:0; margin:0; }
  .recent-list li{
    padding: clamp(8px, 1.2vw, 10px) clamp(6px, 1vw, 8px);
    border-bottom:1px solid rgba(255,255,255,.12);
    display:flex; flex-direction:column; gap:.25rem; animation: fade .25s ease-in-out;
  }
  .recent-list li:last-child{ border-bottom:0 }
  .r-name{ font-size: clamp(14px, 1.9vw, 18px); font-weight:900 }
  .r-meta{ font-size: clamp(11px, 1.6vw, 12px); color:var(--sub) }

  .scroll-controls{ display:flex; gap:.5rem; justify-content:flex-end; margin-top:.6rem }
  .btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    color:#fff; padding:.45rem .65rem; border-radius:8px; cursor:pointer; font-weight:800; font-size: clamp(11px, 1.5vw, 12px);
  }
  .btn:hover{ filter:brightness(1.1) }

  /* Footer status */
  .footer{ padding: .6rem clamp(12px, 1.6vw, 22px) .8rem; font-size: clamp(11px, 1.5vw, 13px); color:var(--sub); text-align:center }

  /* ลด motion สำหรับผู้ใช้ที่ตั้งค่า */
  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      ✔ TMD 60th Anniversary • Check‑in Dashboard
      <span class="live"><span class="dot"></span>LIVE</span>
    </div>

    <div class="bigkpi">
      <div class="kpi-total">
        <div class="num" id="kpi-total">0</div>
        <div class="lbl">จำนวนผู้เช็คอินทั้งหมด</div>
      </div>
      <div class="kpi-dept">
        <div class="num" id="kpi-dept">0</div>
        <div class="lbl">จำนวนแผนก</div>
      </div>
    </div>

    <div class="timebox">
      <div class="now" id="now">--:--:--</div>
      <div class="date" id="date">----</div>
      <div class="upd" id="updated">ข้อมูลอัปเดต: -</div>
    </div>
  </div>

  <!-- Body -->
  <div class="wrap">
    <div class="cols">

      <!-- Spotlight (Latest) -->
      <div class="card">
        <h3>Spotlight – ผู้เช็คอินล่าสุด</h3>
        <div class="spot">
          <div class="confetti" id="confetti"></div>
          <div class="spot-card" id="spot-card">
            <div class="spot-accent"></div>
            <div class="spot-name" id="spot-name">Waiting…</div>
            <div class="spot-meta" id="spot-meta"></div>
          </div>
        </div>
      </div>

      <!-- Department Summary -->
      <div class="card">
        <h3>สรุปจำนวนตามแผนก</h3>
        <div id="dept-wrap"></div>
      </div>

      <!-- Recent 50 (auto scroll) -->
      <div class="card">
        <h3>เช็คอินล่าสุด 50 รายชื่อ</h3>
        <div class="scroll-wrap">
          <div id="viewport" class="scroll-viewport">
            <ul id="recent-list" class="recent-list">
              <li><div class="r-name">Waiting…</div><div class="r-meta"></div></li>
            </ul>
          </div>
          <div class="scroll-controls">
            <button id="btn-up" class="btn">▲ Up</button>
            <button id="btn-down" class="btn">▼ Down</button>
            <button id="btn-pause" class="btn">⏸ Pause</button>
            <button id="btn-resume" class="btn">▶ Resume</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="status" class="footer">Initializing…</div>

<script>
  /* ===== Settings ===== */
  const DATA_URL   = "https://raw.githubusercontent.com/akasitgun/tmd-checkin-display/main/data.json";
  const POLL_MS    = 1200;      // ดึงข้อมูล
  const TOP_DEPT   = 12;        // จำนวนแผนกที่โชว์
  const RECENT_N   = 50;        // แสดงล่าสุด 50 รายชื่อ
  const ORDER_LABEL= 'ลำดับ';   // หรือ 'Registration No.'

  /* ===== State ===== */
  let lastKey   = "";
  let lastTotal = 0;
  let lastSpotTs= "";
  let items     = [];

  /* ===== Helpers ===== */
  const $  = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);
  const fmt = ts => { try{ return new Date(ts).toLocaleString('th-TH',{hour12:false}); }catch{return ts||"";} };
  const fmtDate = d => {
    try{ return new Date(d).toLocaleDateString('th-TH',{weekday:'long', year:'numeric', month:'long', day:'numeric'}); }
    catch{ return d || ""; }
  };

  function normalize(d){
    if (!d) return { items:[], updated:"" };
    if (Array.isArray(d.items)) return { items:d.items.slice(), updated: d.updated || (d.items[0]?.timestamp || "") };
    if (typeof d === 'object')  return { items:[d], updated: d.timestamp || "" };
    try{ return normalize(JSON.parse(d)); }catch{ return { items:[], updated:"" }; }
  }
  function byNewest(a,b){ return new Date(b.timestamp||0) - new Date(a.timestamp||0); }
  function buildKey(list, updated){
    return (updated || (list[0]?.timestamp || "")) + "::" + list.slice(0,120).map(x=>`${x.name}|${x.order}|${x.department}|${x.timestamp}`).join("||");
  }
  function groupDept(list){
    const m = new Map();
    list.forEach(x=>{
      const d = (x.department||"Other").trim();
      m.set(d, (m.get(d)||0)+1);
    });
    return [...m.entries()].sort((a,b)=>b[1]-a[1]);
  }

  /* ===== Header – Time & Count‑up ===== */
  function tickClock(){
    const now = new Date();
    $("#now").textContent = now.toLocaleTimeString('th-TH',{hour12:false});
    $("#date").textContent = fmtDate(now);
  }
  setInterval(tickClock, 500); tickClock();

  function animateTotal(from, to, ms=700){
    const el = $("#kpi-total");
    const start = performance.now();
    function step(t){
      const p = Math.min(1, (t-start)/ms);
      const val = Math.round(from + (to-from)*p);
      el.textContent = val.toLocaleString('th-TH');
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function renderHeader(updated){
    const total = items.length;
    if (total !== lastTotal){
      animateTotal(lastTotal, total);
      lastTotal = total;
    } else {
      $("#kpi-total").textContent = total.toLocaleString('th-TH');
    }
    $("#kpi-dept").textContent  = groupDept(items).length;
    $("#updated").textContent   = `ข้อมูลอัปเดต: ${updated ? fmt(updated) : "-"}`;
  }

  /* ===== Spotlight ===== */
  function confettiBurst(ms=1500, N=60){
    const cont = $("#confetti");
    cont.innerHTML = "";
    for(let i=0;i<N;i++){
      const el = document.createElement("i");
      const h  = Math.floor(Math.random()*360);
      el.style.left = Math.random()*100 + "%";
      el.style.background = `hsl(${h} 90% 60%)`;
      el.style.animationDuration = (1.6 + Math.random()*0.9) + "s";
      el.style.transform = `translateX(${(Math.random()*40-20)}px)`;
      cont.appendChild(el);
    }
    setTimeout(()=>{ cont.innerHTML=""; }, ms+300);
  }
  function renderSpotlight(){
    const x = items[0];
    if (!x){
      $("#spot-name").textContent = "Waiting…";
      $("#spot-meta").textContent = "";
      return;
    }
    $("#spot-name").textContent = x.name || "ผู้เข้าร่วม";
    $("#spot-meta").textContent = `${ORDER_LABEL}: ${x.order||"-"} • ${(x.department||"")} • ${fmt(x.timestamp)}`;

    if ((x.timestamp||"") !== lastSpotTs){
      lastSpotTs = x.timestamp||"";
      const card = $("#spot-card");
      card.style.animation = "none"; void card.offsetWidth; card.style.animation = ""; // retrigger
      confettiBurst();
    }
  }

  /* ===== Department Summary ===== */
  function renderDept(){
    const wrap = $("#dept-wrap"); wrap.innerHTML="";
    const pairs = groupDept(items).slice(0, TOP_DEPT);
    const max = Math.max(1, ...pairs.map(p=>p[1]));
    pairs.forEach(([name,count])=>{
      const row = document.createElement("div");
      row.className = "dept-item";
      row.innerHTML = `
        <div class="dept-row">
          <div class="dept-name">${name||"Other"}</div>
          <div class="dept-count">${count}</div>
        </div>
        <div class="bar"><span style="width:${Math.round(count/max*100)}%"></span></div>
      `;
      wrap.appendChild(row);
    });
  }

  /* ===== Recent 50 + Auto scroll ===== */
  let autoDir = 1;       // 1 = down, -1 = up
  let autoTimer = null;  // interval id
  const STEP = 1.2;      // px ต่อก้าว
  const TICK = 16;       // ms ต่อก้าว (~60fps)

  function startAutoScroll(){
    stopAutoScroll();
    const vp = $("#viewport");
    autoTimer = setInterval(()=>{
      if (vp.scrollHeight <= vp.clientHeight) return; // ไม่ overflow ไม่ต้องเลื่อน
      vp.scrollTop += STEP * autoDir;
      const endBottom = (vp.scrollTop + vp.clientHeight >= vp.scrollHeight - 1);
      const endTop    = (vp.scrollTop <= 0);
      if (endBottom) autoDir = -1;
      if (endTop)    autoDir = 1;
    }, TICK);
  }
  function stopAutoScroll(){
    if (autoTimer){ clearInterval(autoTimer); autoTimer = null; }
  }
  function renderRecent(){
    const ul = $("#recent-list"); ul.innerHTML="";
    items.slice(0, RECENT_N).forEach(x=>{
      const li = document.createElement("li");
      li.innerHTML = `
        <div class="r-name">${x.name||"ผู้เข้าร่วม"}</div>
        <div class="r-meta">${ORDER_LABEL}: ${x.order||"-"} • ${(x.department||"")} • ${fmt(x.timestamp)}</div>
      `;
      ul.appendChild(li);
    });
    startAutoScroll(); // reset auto scroll ทุกครั้งที่รายการเปลี่ยน
  }

  // controls
  $("#btn-up").addEventListener("click", ()=>{ autoDir = -1; startAutoScroll(); });
  $("#btn-down").addEventListener("click", ()=>{ autoDir = 1; startAutoScroll(); });
  $("#btn-pause").addEventListener("click", ()=> stopAutoScroll());
  $("#btn-resume").addEventListener("click", ()=> startAutoScroll());
  $("#viewport").addEventListener("mouseenter", stopAutoScroll);
  $("#viewport").addEventListener("mouseleave", startAutoScroll);

  /* ===== Data Loop ===== */
  async function load(){
    try{
      const r = await fetch(DATA_URL + "?t=" + Date.now(), { cache:"no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      let raw = await r.json(); if (typeof raw === "string"){ try{ raw = JSON.parse(raw); }catch{} }

      const data = normalize(raw);
      const list = (data.items||[]).slice().sort(byNewest);
      const key  = buildKey(list, data.updated);

      if (key !== lastKey){
        lastKey = key;
        items = list;

        renderHeader(data.updated);
        renderSpotlight();
        renderDept();
        renderRecent();

        $("#status").textContent = `Showing ${items.length} items • Poll ${POLL_MS}ms • Source: RAW • Auto-scroll ${autoDir===1?'DOWN':'UP'}`;
      }
    }catch(e){
      $("#status").textContent = "Fetch error: " + (e.message || e);
    }
  }

  load();
  setInterval(load, POLL_MS);
</script>
</body>
</html>
