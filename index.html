<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>TMD Check-in Live Ticker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root{
    --dur: 14s;        /* ความยาวรอบเริ่มต้นของการวิ่ง (จะถูก JS ปรับตามข้อความรวม) */
    --bg: #0b59a1;
  }

  body{
    margin:0; background:var(--bg);
    font-family:"Segoe UI", system-ui, -apple-system, Arial, Helvetica, sans-serif;
    overflow:hidden;
  }

  /* Header */
  .header{
    text-align:center; padding:24px;
    color:#fff; font-size:40px; font-weight:800; letter-spacing:.5px;
  }

  /* Ticker area */
  .ticker-container{
    width:100%; white-space:nowrap; overflow:hidden; box-sizing:border-box;
    padding:20px 0;
    background:rgba(255,255,255,.10);
    border-top:3px solid rgba(255,255,255,.2);
    border-bottom:3px solid rgba(255,255,255,.2);
  }
  .ticker-text{
    display:inline-block; padding-left:50%; /* ให้เห็นข้อความตั้งแต่ต้น */
    font-size:80px; font-weight:900; color:#fff;
    animation: ticker var(--dur) linear infinite;
    will-change: transform;
  }
  @keyframes ticker{
    0%   { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
  }

  /* Flash overlay ไม่ทับ ticker */
  .flash{
    animation: ticker var(--dur) linear infinite, flashAnim .4s ease-in-out;
  }
  @keyframes flashAnim{
    0% { color:#22c55e; }
    100% { color:#ffffff; }
  }

  /* Meta */
  .meta{ color:#d3e6ff; text-align:center; margin-top:12px; font-size:18px; opacity:.95; }
  .status{ color:rgba(255,255,255,.85); text-align:center; font-size:14px; margin-top:4px; opacity:.85; }
</style>
</head>

<body>
  <div class="header">✔ TMD 60th Anniversary • Live Check-in</div>

  <div class="ticker-container">
    <div id="ticker" class="ticker-text">Waiting for check-ins...</div>
  </div>

  <div class="meta"><span id="ts"></span></div>
  <div id="status" class="status"></div>

<script>
  // ===== Settings =====
  const DATA_URL       = "data.json";
  const POLL_MS        = 1500;

  // ป้ายลำดับ: 'th' = ลำดับ, 'en' = Registration No.
  const LABEL_MODE     = 'th';
  const ORDER_LABEL    = LABEL_MODE === 'th' ? 'ลำดับ' : 'Registration No.';

  // จำนวน "คนล่าสุด" ที่ต้องการแสดง (รวมเป็นข้อความวิ่ง)
  const RECENT_LIMIT   = 5;

  // ปรับความเร็วตามความยาวตัวอักษรรวม
  const MIN_DUR  = 12;   // วินาทีต่ำสุด
  const MAX_DUR  = 30;   // วินาทีสูงสุด
  const CHAR_PER = 32;   // ตัวอักษรต่อวินาที (มาก = วิ่งเร็ว)

  // เก็บหลายชื่อบนฝั่งหน้าเว็บ
  // ถ้าอยากให้จำไว้หลังรีเฟรช ให้ตั้ง USE_STORAGE = true (ใช้ localStorage)
  const USE_STORAGE    = false;
  const STORAGE_KEY    = "tmd-recent";

  let lastStamp = null;
  let recent = []; // [{name, order, department, timestamp}]

  const ticker  = document.getElementById("ticker");
  const tsBox   = document.getElementById("ts");
  const statusB = document.getElementById("status");

  // โหลด recent จาก localStorage ถ้าเปิดใช้
  if (USE_STORAGE) {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) recent = JSON.parse(raw) || [];
    } catch {}
  }

  function setStatus(msg, ok=true){
    statusB.textContent = msg;
    statusB.style.color = ok ? "rgba(255,255,255,.85)" : "#ffd9d9";
  }

  function formatLocal(ts){
    try{ return new Date(ts).toLocaleString('th-TH', { hour12:false }); }
    catch{ return ts || ""; }
  }

  function tuneTickerSpeed(totalText){
    const len = (totalText || '').length || 1;
    let sec = Math.round(len / CHAR_PER);
    sec = Math.min(MAX_DUR, Math.max(MIN_DUR, sec));
    ticker.style.setProperty('--dur', sec + 's');
  }

  // รวมหลายชื่อเป็นข้อความเดียว (ชื่อ • แผนก • ลำดับ)
  function renderText(items){
    // ตัวคั่นระหว่างคน
    const SEP = "   •   ";
    const parts = items.map(item => {
      const name = (item.name ?? "").toString().trim() || "ผู้เข้าร่วม";
      const order= (item.order ?? "").toString().trim();
      const dept = (item.department ?? "").toString().trim();
      const orderPart = order ? `(${ORDER_LABEL}: ${order})` : "";
      const deptPart  = dept ? `• ${dept}` : "";
      return `🎉 ยินดีต้อนรับคุณ ${name} ${orderPart} ${deptPart} 🎉`;
    });
    return parts.join(SEP);
  }

  function pushRecent(entry){
    // ถ้า timestamp ซ้ำ ให้ไม่เพิ่ม (กันกรณีรอบ polling ชิดกันมาก)
    if (recent.length && recent[0].timestamp === entry.timestamp) return;
    recent.unshift(entry);              // เพิ่มไว้หัวแถว
    if (recent.length > RECENT_LIMIT) { // จำกัดความยาว
      recent = recent.slice(0, RECENT_LIMIT);
    }
    if (USE_STORAGE) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(recent)); } catch {}
    }
  }

  async function load(){
    try{
      const r = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
      if(!r.ok) throw new Error("HTTP " + r.status);

      let d = await r.json();
      if(typeof d === "string"){ try{ d = JSON.parse(d); } catch(e){} }

      const name = (d.name ?? "").toString().trim();
      const order= (d.order ?? "").toString().trim();
      const dept = (d.department ?? "").toString().trim();
      const timestamp = (d.timestamp ?? "").toString();

      if(timestamp && timestamp !== lastStamp){
        lastStamp = timestamp;

        // เก็บรายการล่าสุดไว้ใน recent
        pushRecent({ name, order, department: dept, timestamp });

        // ประกอบเป็นข้อความยาวสำหรับ ticker
        const text = renderText(recent);
        ticker.textContent = text;

        // ปรับความเร็วตามความยาวรวม
        tuneTickerSpeed(text);

        // Flash overlay โดยไม่ทำให้ ticker หยุด
        ticker.classList.remove("flash");
        requestAnimationFrame(() => ticker.classList.add("flash"));

        // เวลา/สถานะ
        tsBox.textContent = "Updated: " + formatLocal(timestamp);
        setStatus(`Polling every ${ (POLL_MS/1000).toFixed(1) }s • Last update OK`, true);
      }
    }catch(e){
      setStatus("Fetch error: " + (e.message || e), false);
    }
  }

  load();
  setInterval(load, POLL_MS);
</script>
</body>
</html>
